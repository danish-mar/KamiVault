services:
  mongodb:
    image: mongo:4.4
    container_name: kamivault-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - kamivault-network

  minio:
    image: minio/minio:latest
    container_name: kamivault-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - kamivault-network

networks:
  kamivault-network:
    driver: bridge

volumes:
  mongodb_data:
  minio_data:
